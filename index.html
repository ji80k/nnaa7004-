<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صور nnaa7004</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        header h1 {
            font-size: 2.5rem;
            color: #e94560;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        header p {
            color: #a0a0a0;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .card {
            background: #1a1a2e;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid #e94560;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.4);
        }

        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }

        .card .info {
            padding: 15px;
            text-align: center;
            background: #16213e;
        }

        .card .info span {
            display: block;
            color: #e94560;
            font-weight: bold;
            font-size: 1.1rem;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: #a0a0a0;
            border-top: 1px solid #333;
            margin-top: 20px;
        }

        footer a {
            color: #e94560;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <header>
            <h1>📸 معرض صور nnaa7004</h1>
            <p>تم النشر على GitHub Pages</p>
        </header>

        <!-- المعرض - هنا الصور الأربع -->
        <div class="gallery">
            <!-- صورة 1 -->
            <div class="card">
                <img src="nnaa7004-1.jpg" alt="صورة nnaa7004 1">
                <div class="info">
                    <span>nnaa7004 - 1</span>
                </div>
            </div>

            <!-- صورة 2 -->
            <div class="card">
                <img src="nnaa7004-2.jpg" alt="صورة nnaa7004 2">
                <div class="info">
                    <span>nnaa7004 - 2</span>
                </div>
            </div>

            <!-- صورة 3 -->
            <div class="card">
                <img src="nnaa7004-3.jpg" alt="صورة nnaa7004 3">
                <div class="info">
                    <span>nnaa7004 - 3</span>
                </div>
            </div>

            <!-- صورة 4 -->
            <div class="card">
                <img src="nnaa7004-4.jpg" alt="صورة nnaa7004 4">
                <div class="info">
                    <span>nnaa7004 - 4</span>
                </div>
            </div>
        </div>
        <!-- نهاية المعرض -->

        <!-- الفوتر -->
        <footer>
            <p>© 2024 nnaa7004 | مستضاف على <a href="https://github.com" target="_blank">GitHub</a></p>
        </footer>
    </div>
</body>
</html>
